# Ref: https://developers.openai.com/codex/cli
- name: Check if Codex CLI is installed
  shell: |
    if [ -s "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh" ]; then
      source "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh"
    fi
    command -v codex
  args:
    executable: /bin/bash
  register: codex_check
  changed_when: false
  failed_when: false

- name: Check if npm is installed
  shell: |
    if [ -s "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh" ]; then
      source "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh"
    fi
    command -v npm
  args:
    executable: /bin/bash
  register: npm_check
  changed_when: false
  failed_when: false

- name: Fail when npm is missing
  fail:
    msg: "Codex CLI installation requires npm. Please install Node.js/npm first (e.g., include tasks/nodejs.yaml)."
  when:
    - codex_check.rc != 0
    - npm_check.rc != 0

- name: Install Codex CLI
  shell: |
    if [ -s "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh" ]; then
      source "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh"
    fi
    npm install -g @openai/codex
  args:
    executable: /bin/bash
  when:
    - codex_check.rc != 0
    - npm_check.rc == 0
