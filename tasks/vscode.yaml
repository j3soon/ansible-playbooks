# Ref: https://snapcraft.io/code
# Ref: https://code.visualstudio.com/docs/setup/linux#_snap
# Ref: https://build.nvidia.com/spark/vscode/instructions
- name: Install Visual Studio Code via snap on amd64
  become: true
  snap:
    name: code
    classic: true
  when: ansible_facts['architecture'] == 'x86_64'

- name: Gather package facts for arm64 VS Code install
  package_facts:
    manager: auto
  when: ansible_facts['architecture'] == 'aarch64'

- name: Download Visual Studio Code arm64 package
  get_url:
    url: https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-arm64
    dest: /tmp/vscode-arm64.deb
    mode: '0644'
  when:
    - ansible_facts['architecture'] == 'aarch64'
    - "'code' not in ansible_facts.packages"

- name: Install Visual Studio Code arm64 package
  become: true
  command:
    cmd: dpkg -i /tmp/vscode-arm64.deb
  when:
    - ansible_facts['architecture'] == 'aarch64'
    - "'code' not in ansible_facts.packages"
